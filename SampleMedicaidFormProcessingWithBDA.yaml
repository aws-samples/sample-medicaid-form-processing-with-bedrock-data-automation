  AthenaNamedQuery1:
      Type: "AWS::Athena::NamedQuery"
      DependsOn: [MyCustomWorkGroup, KeyGlueTable, TableGlueTable]
      Properties:
          Description: "document_extract_view"
          Database: !Ref GlueDatabase
          WorkGroup: !Ref MyCustomWorkGroup
          QueryString: !Sub |
                  CREATE OR REPLACE VIEW "document_view" AS 
                  SELECT
                    a.*
                  , b.*
                  FROM
                    ((
                      SELECT
                        patientname
                      , patientaddress
                      , city
                      , state
                      , zipcode
                      , totalcharge
                      , federaltaxid
                      FROM
                        "${GlueDatabase}"."${KeyGlueTable}"
                  )  a
                  INNER JOIN (
                      SELECT
                        fromdate dateofservice
                      , othpcs Procedure
                      , charges
                      , providerid
                      , patientname tablevaluepatientname
                      FROM
                        "${GlueDatabase}"."${TableGlueTable}"
                  )  b ON (a.patientname = b.tablevaluepatientname))       